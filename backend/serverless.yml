service: flowboard-api

useDotenv: true

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-south-1
  stage: ${opt:stage, 'prod'}
  memorySize: 1024
  timeout: 30
  
  environment:
    NODE_ENV: production
    MONGODB_URI: ${env:MONGODB_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    CORS_ORIGIN: ${env:CORS_ORIGIN}
    RSA_PUBLIC_KEY: ${env:RSA_PUBLIC_KEY}
    RSA_PRIVATE_KEY: ${env:RSA_PRIVATE_KEY}

  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:4000
        - http://localhost:5173
        - ${env:CORS_ORIGIN_1}
        - ${env:CORS_ORIGIN_2}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      allowCredentials: true

functions:
  api:
    handler: dist/lambda.handler
    events:
      - httpApi:
          path: /
          method: '*'
      - httpApi:
          path: /{proxy+}
          method: '*'

package:
  patterns:
    - 'dist/**'
    - 'node_modules/**'
    - 'package.json'
    - '!node_modules/@types/**'
    - '!node_modules/typescript/**'
    - '!node_modules/ts-node/**'
    - '!node_modules/nodemon/**'
    - '!src/**'
    - '!*.md'
    - '!*.zip'
